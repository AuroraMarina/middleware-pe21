openapi: "3.1.0"
info:
  title: "UIDE Inscripciones API"
  version: "2.0.0"
  license: 
    name: "MIT"
    identifier: "MIT"

servers:
  - url: http://localhost:3000
    description: "Servidor local"

components:
  schemas:

    InscripcionRequest:
      type: object
      required:
        - estudianteID
        - materias
        - periodoID
        - metodo_pago
      properties:
        estudianteID:
          type: string

        materias:
          type: array
          minItems: 1
          items:
            type: string

        periodoID:
          type: string

        metodo_pago:
          type: string
          enum:
            - Efectivo
            - Transferencia
            - Débito
            - Crédito

    InscripcionSuccess:
      type: object
      properties:
        version:
          type: string

        message:
          type: object
          properties:
            estudianteID:
              type: string

            materias:
              type: array
              items:
                type: string

            periodoID:
              type: string

            metodo_pago:
              type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string